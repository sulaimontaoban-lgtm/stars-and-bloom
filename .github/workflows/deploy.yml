name: Live Server Auto-Update

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Upload to Temporary Folder
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/stars-and-bloom-temp"
          rm: true

      - name: Move Files to Web Root
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            # Clean the web directory
            sudo rm -rf /var/www/html/*
            # Move files from temp to web root
            sudo cp -r /home/ubuntu/stars-and-bloom-temp/* /var/www/html/
            # Set proper permissions
            sudo chown -R www-data:www-data /var/www/html/
            sudo chmod -R 755 /var/www/html/
            # Restart Apache
            sudo systemctl restart apache2
            # Clean up temp folder
            rm -rf /home/ubuntu/stars-and-bloom-temp